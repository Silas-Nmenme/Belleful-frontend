<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Belleful | Join Delicious Food Delivery</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- GSAP for professional animations -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --appetite-gold: #D97706;
            --spicy-rose: #B91C52;
            --steam-cream: #FEF3C7;
            --soup-green: #10B981;
        }
        /* Override for food vending theme */
        :root {
            --bs-primary: var(--appetite-gold);
            --bs-primary-rgb: 217, 119, 6;
            --bs-warning: #F59E0B;
        }
        body { 
            font-family: 'Open Sans', sans-serif; 
            overflow-x: hidden;
        }
        .btn-primary, .btn-auth {
            background: linear-gradient(135deg, var(--appetite-gold), #F59E0B) !important;
            border: none !important;
            color: var(--spicy-rose) !important;
        }
        .navbar-brand span {
            background: linear-gradient(135deg, var(--appetite-gold), var(--spicy-rose));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="kitchen-bg">

    <!-- Food Particles Layer (z-index 1) -->
    <div id="food-particles" class="food-particles">
        <object type="image/svg+xml" data="asset/food-particles.svg"></object>
    </div>

    <!-- Steam Overlay (z-index 2) -->
    <div class="steam-overlay"></div>

    <!-- Navbar (z-index 1000) -->
    <nav class="navbar navbar-expand-lg navbar-enhanced navbar-wine fixed-top shadow-lg" id="main-navbar">
        <div class="container">
            <a class="navbar-brand text-wine fs-2 fw-bold" href="index.html">
                <img src="asset/logo.jpeg" alt="Belleful Logo" style="height: 50px; width: auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(217,119,6,0.3);">
                <span>Belleful</span>
            </a>
            <button class="navbar-toggler border-0 p-2 rounded shadow-sm" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="background: rgba(217,119,6,0.15); min-height: 52px;" aria-label="Toggle navigation menu">
                <i class="fas fa-bars text-warning fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="menu.html"><i class="fas fa-utensils me-1"></i>Menu</a></li>
                    <li class="nav-item position-relative">
                        <a class="nav-link" href="cart.html">
                            <i class="fas fa-shopping-cart me-1"></i>Cart
                            <span class="cart-badge d-none bg-danger rounded-circle px-1" id="cart-count" style="font-size: 0.75rem; min-width: 18px; height: 18px;">0</span>
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-box me-1"></i>Orders</a></li>
                    <li class="nav-item mx-2">
                        <button class="btn btn-outline-warning btn-sm px-3 rounded-pill shadow-sm" id="search-toggle" title="Search delicious dishes" style="min-height: 44px;">
                            <i class="fas fa-search"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-warning fw-semibold ms-1 px-4 rounded-pill shadow-sm d-flex align-items-center" href="login.html" style="min-height: 44px;">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Professional Signup Hero Section -->
    <section class="auth-hero">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                    <!-- Animated Auth Card -->
                    <div class="card card-auth p-0 p-md-5" data-aos="fade-up">
                        <div class="card-body p-4 p-lg-5">
                            <!-- Logo & Welcome -->
                            <div class="text-center mb-5 pb-4">
                                <div class="logo-container mb-4">
                                    <img src="asset/logo.jpeg" alt="Belleful - Fresh Nigerian Cuisine Delivered" class="img-fluid rounded-4 shadow-lg" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
                                </div>
                                <h1 class="h2 fw-bold mb-3" style="background: linear-gradient(135deg, #D97706, #B91C52); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Join Belleful</h1>
                                <p class="lead text-muted mb-0 fs-6">Create your account to discover amazing Nigerian dishes from local vendors</p>
                            </div>

                            <form id="signup-form">
                                <div class="mb-4">
                                    <label for="signup-name" class="form-label fw-semibold fs-5 mb-3" style="color: #D97706;">Full Name</label>
                                    <input type="text" class="form-control form-control-lg form-control-auth" id="signup-name" required 
                                        placeholder="Enter your full name" autocomplete="name">
                                </div>
                                <div class="mb-4">
                                    <label for="signup-email" class="form-label fw-semibold fs-5 mb-3" style="color: #D97706;">Email Address</label>
                                    <input type="email" class="form-control form-control-lg form-control-auth" id="signup-email" required 
                                        placeholder="your@email.com" autocomplete="email">
                                </div>
                                <div class="mb-4">
                                    <label for="signup-password" class="form-label fw-semibold fs-5 mb-3" style="color: #D97706;">Password</label>
                                    <input type="password" class="form-control form-control-lg form-control-auth" id="signup-password" required 
                                        minlength="6" placeholder="At least 6 characters" autocomplete="new-password">
                                </div>
                                <div class="d-grid gap-3">
                                    <button type="submit" class="btn btn-auth fs-5 py-4 shadow-lg" id="signup-submit-btn">
                                        <span id="signup-btn-text" class="fw-bold">Create My Account</span>
                                        <span id="signup-spinner" class="spinner-border spinner-border-sm d-none ms-2" role="status" aria-hidden="true"></span>
                                    </button>
                                </div>
                                <div id="signup-error" class="alert alert-danger mt-4 d-none shadow-sm" role="alert"></div>
                                <div class="text-center mt-4 pt-3">
                                    <small class="text-muted">Already have an account? <a href="login.html" class="text-decoration-none fw-semibold" style="color: #D97706;">Login here</a></small>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- App JS with animations -->
    <script src="js/app.js"></script>
    <script>
        // Professional GSAP Animations for Signup (same as login)
        document.addEventListener('DOMContentLoaded', function() {
            // Master timeline
            const tl = gsap.timeline({ defaults: { duration: 1.2, ease: 'power3.out' } });
            
            tl.from('#main-navbar', { y: -100, opacity: 0 }, 0);
            tl.from('.card-auth', { y: 100, scale: 0.9, rotationX: 20, opacity: 0 }, 0.3);
            
            // Logo floating
            gsap.to('.logo-container img', {
                y: -8, rotation: 2, duration: 3, repeat: -1, yoyo: true, ease: 'power2.inOut'
            });
            
            // Particles breathing
            gsap.to('#food-particles', {
                scale: 1.03, duration: 4, repeat: -1, yoyo: true, ease: 'sine.inOut'
            });
            
            // Form interactions
            const inputs = document.querySelectorAll('.form-control-auth');
            inputs.forEach(input => {
                input.addEventListener('focus', () => gsap.to(input, { scale: 1.02, duration: 0.3, y: -2 }));
                input.addEventListener('blur', () => gsap.to(input, { scale: 1, duration: 0.3, y: 0 }));
            });
            
            // Submit button sizzle
            const signupBtn = document.getElementById('signup-submit-btn');
            signupBtn.addEventListener('mouseenter', () => {
                gsap.to(signupBtn, { scale: 1.05, y: -4, boxShadow: '0 24px 64px rgba(217,119,6,0.6)', duration: 0.4 });
                createSteamBurst(signupBtn);
            });
            signupBtn.addEventListener('mouseleave', () => {
                gsap.to(signupBtn, { scale: 1, y: 0, duration: 0.3 });
            });
        });

        function createSteamBurst(element) {
            const rect = element.getBoundingClientRect();
            const steam = document.createElement('div');
            steam.style.cssText = `
                position: fixed; left: ${rect.left + rect.width/2}px; top: ${rect.top + rect.height/2}px;
                width: 4px; height: 4px; background: radial-gradient(circle, rgba(254,243,199,0.8), transparent);
                border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
            `;
            document.body.appendChild(steam);
            gsap.to(steam, { scale: 8, opacity: 0, y: -60, duration: 0.8, ease: 'power2.out', onComplete: () => steam.remove() });
        }
    </script>

</body>
</html>
