<div class="cart-modal" id="cart-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="text-2xl font-playfair font-bold text-wine">Your Cart</h3>
            <button class="close-cart text-gray-500 hover:text-wine text-2xl" aria-label="Close cart">&times;</button>
        </div>
        <div class="modal-body">
            <div id="cart-items" class="empty-cart">
                <i class="fas fa-shopping-cart text-4xl text-gray-400 mb-4"></i>
                <h4>Your cart is empty</h4>
                <p>Add some delicious items to get started!</p>
            </div>
            <div id="cart-total-section" class="mt-4 hidden">
                <div class="flex justify-between font-bold text-lg">
                    <span>Total:</span>
                    <span id="cart-total">₦0</span>
                </div>
                <a href="cart.html" class="w-full bg-gold text-wine py-3 px-6 rounded-full text-center font-semibold mt-4 block hover:bg-yellow-400 transition-all">View Cart & Checkout</a>
            </div>
        </div>
    </div>
</div>
