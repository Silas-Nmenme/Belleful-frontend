<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Belleful</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-wine via-wine-dark to-gold/20 font-opensans text-white min-h-screen">
    <!-- Header (same as index) -->
    <nav class="fixed top-0 w-full bg-wine/95 backdrop-blur-md z-50 shadow-lg transition-all duration-500" id="nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-utensils text-gold text-3xl"></i>
                    <a href="index.html" class="text-2xl font-playfair text-gold font-bold hover:text-amber-500 transition-colors">Belleful</a>
                </div>
<div class="hidden md:flex items-center space-x-4">
                    <a href="menu.html" class="text-white hover:text-gold transition-colors px-3 py-2 rounded-lg hover:bg-gold/20" title="View Menu">Menu</a>
                    <a href="cart.html" class="text-white hover:text-gold transition-colors px-3 py-2 rounded-lg hover:bg-gold/20" title="Shopping Cart">Cart</a>
                    <a href="orders.html" class="text-white hover:text-gold transition-colors px-3 py-2 rounded-lg hover:bg-gold/20" title="Your Orders">Orders</a>
                    <button id="search-toggle" class="text-white hover:text-gold p-2 rounded-lg hover:bg-gold/20 transition-all text-xl" title="Search dishes" aria-label="Search dishes">
                        <i class="fas fa-search"></i>
                    </button>
                    <div id="user-nav" class="flex items-center space-x-2 bg-green-500 text-white px-4 py-2 rounded-lg font-semibold hidden">
                        <i class="fas fa-user-check"></i>
                        <span id="user-name">User</span>
                        <button id="logout-btn" class="ml-2 text-white hover:text-yellow-200" title="Logout" aria-label="Logout">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                    <a href="login.html" id="login-link" class="bg-gold text-wine px-6 py-2 rounded-lg font-semibold hover:bg-amber-400 transition-all flex items-center space-x-2 shadow-lg">Login</a>
                </div>
                <div class="md:hidden">
                    <button id="mobile-menu-btn" class="text-white text-2xl" aria-label="Toggle mobile menu" title="Toggle menu">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
            <!-- Mobile menu -->
            <div id="mobile-menu" class="md:hidden hidden bg-wine/95 pb-4">
                <a href="menu.html" class="block px-6 py-2 text-white hover:text-gold">Menu</a>
                <a href="cart.html" class="block px-6 py-2 text-white hover:text-gold">Cart</a>
                <a href="orders.html" class="block px-6 py-2 text-white hover:text-gold">Orders</a>
                <a href="login.html" id="mobile-login-link" class="block px-6 py-2 text-white hover:text-gold flex items-center space-x-3 bg-gold text-wine px-4 py-2 rounded-lg mx-4 mb-2">
                    <i class="fas fa-user"></i> <span>Login</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero/Auth Section - Balanced lighter gradient for "solar" -->
    <section class="min-h-screen flex items-center justify-center pt-24 px-4 bg-gradient-to-br from-wine/30 via-gold/20 to-wine/50">
        <div class="max-w-md w-full bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-gold/30">
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 mb-8">
                <button class="flex-1 py-4 px-6 font-semibold text-wine border-b-2 border-gold tab-active" id="login-tab">Login</button>
                <button class="flex-1 py-4 px-6 font-semibold text-gray-500 hover:text-wine tab" id="signup-tab">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-wine font-semibold mb-2">Email</label>
                    <input type="email" id="login-email" required class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-gold transition-all" placeholder="your@email.com">
                </div>
                <div>
                    <label class="block text-wine font-semibold mb-2">Password</label>
                    <input type="password" id="login-password" required class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-gold transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-gold text-wine py-4 px-6 rounded-2xl font-bold text-lg shadow-xl hover:bg-amber-400 hover:shadow-2xl transition-all transform hover:scale-[1.02]">Login</button>
            </form>

            <!-- Signup CTA - Prominent gold, always visible -->
            <div class="mt-8 pt-8 border-t border-gray-200 text-center">
                <p class="text-gray-600 mb-4">New to Belleful?</p>
                <a href="signup.html" class="block w-full bg-gradient-to-r from-gold to-amber-500 text-wine py-4 px-6 rounded-2xl font-bold text-xl shadow-2xl hover:from-amber-400 hover:shadow-3xl transition-all transform hover:scale-[1.02] animate-pulse">Create Account Now ✨</a>
            </div>
        </div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
