<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Belleful</title>
    
    <!-- Same CDNs as index.html -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-primary min-vh-100 d-flex align-items-center">
    <!-- Back Navigation -->
    <a href="index.html" class="position-fixed top-4 start-4 btn btn-light btn-lg shadow-lg z-3 animate__animated animate__fadeInLeft" title="Back to Home">
        <i class="fas fa-arrow-left me-2"></i>Back to Menu
    </a>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-12" data-aos="fade-up" data-aos-duration="1000">
                <!-- Auth Tabs -->
                <div class="card border-0 shadow-xl rounded-5 overflow-hidden">
                    <div class="card-header bg-white border-0 pb-0">
                        <ul class="nav nav-pills nav-fill mb-0" id="authTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active rounded-0 fw-bold py-3" id="user-tab" data-bs-toggle="pill" data-bs-target="#user-login" type="button">
                                    <i class="fas fa-user me-2"></i>User Login
                                </button>
                            </li>
                       <!--<li class="nav-item" role="presentation">
                                <button class="nav-link rounded-0 fw-bold py-3" id="admin-tab" data-bs-toggle="pill" data-bs-target="#admin-login" type="button">
                                    <i class="fas fa-user-shield me-2"></i>Admin Login
                                </button> -->
                            </li>
                        </ul>
                    </div>
                    <div class="card-body p-5">
                        <div class="tab-content" id="authTabContent">
                            <!-- User Auth -->
                            <div class="tab-pane fade show active" id="user-login" role="tabpanel">
                                <!-- Login Form -->
                                <div id="loginForm">
                                    <div class="text-center mb-5">
                                        <div class="hero-icon mb-4 mx-auto">
                                            <i class="fas fa-sign-in-alt fa-4x text-primary"></i>
                                        </div>
                                        <h2 class="fw-bold text-dark mb-3">Welcome Back</h2>
                                        <p class="text-muted lead">Sign in to your account</p>
                                    </div>
                                    
                                    <form id="loginFormSubmit" novalidate>
                                        <div class="mb-4">
                                            <label class="form-label fw-bold">Email</label>
                                            <div class="input-group input-group-lg">
                                                <span class="input-group-text">
                                                    <i class="fas fa-envelope"></i>
                                                </span>
                                                <input type="email" class="form-control form-control-lg" id="loginEmail" required>
                                            </div>
                                            <div class="invalid-feedback"></div>
                                        </div>
                                        <div class="mb-4">
                                            <label class="form-label fw-bold">Password</label>
                                            <div class="input-group input-group-lg">
                                                <span class="input-group-text">
                                                    <i class="fas fa-lock"></i>
                                                </span>
                                                <input type="password" class="form-control form-control-lg" id="loginPassword" required>
                                            </div>
                                            <div class="invalid-feedback"></div>
                                        </div>
                                        <button type="submit" class="btn btn-primary w-100 btn-lg py-3 fw-bold add-to-cart-btn">
                                            <i class="fas fa-sign-in-alt me-2"></i>Login
                                        </button>
                                    </form>
                                </div>

                                <!-- OTP Form -->
                                <div id="otpForm" style="display:none;">
                                    <div class="text-center mb-5">
                                        <div class="hero-icon mb-4 mx-auto">
                                            <i class="fas fa-mobile-alt fa-4x text-success"></i>
                                        </div>
                                        <h2 class="fw-bold text-success mb-3">Verify OTP</h2>
                                        <p class="text-muted lead">Check your email for 6-digit code</p>
                                    </div>
                                    <form id="otpFormSubmit" novalidate>
                                        <div class="mb-4">
                                            <label class="form-label fw-bold">Email</label>
                                            <input type="email" class="form-control form-control-lg" id="otpEmail" readonly>
                                        </div>
                                        <div class="mb-4">
                                            <label class="form-label fw-bold">Enter 6-digit OTP</label>
                                            <div class="input-group input-group-lg">
                                                <span class="input-group-text">
                                                    <i class="fas fa-key"></i>
                                                </span>
                                                <input type="text" class="form-control form-control-lg text-center fs-3 fw-bold" 
                                                       id="otpCode" maxlength="6" pattern="[0-9]{6}" required>
                                            </div>
                                            <div class="invalid-feedback"></div>
                                        </div>
                                        <div class="d-flex gap-3">
                                            <button type="submit" class="btn btn-success flex-fill btn-lg py-3 fw-bold">
                                                <i class="fas fa-check me-2"></i>Verify
                                            </button>
                                            <button type="button" class="btn btn-outline-secondary btn-lg py-3" onclick="resendOTP()">
                                                <i class="fas fa-redo me-2"></i>Resend
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>

                            <!-- Register Section (within user tab) -->
                            <div id="registerSection" class="mt-5 pt-4 border-top">
                                <div class="text-center">
                                    <h5 class="fw-bold text-muted mb-4">New to Belleful?</h5>
                                    <p class="text-muted mb-4">Create account in seconds</p>
                                    <button class="btn btn-outline-primary btn-lg px-5" onclick="showRegister()">
                                        <i class="fas fa-user-plus me-2"></i>Create Account
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/constants.js"></script>
    <script>
        AOS.init({ duration: 1200, once: true });
        
        // Enhanced form handlers with AuthManager
        document.addEventListener('DOMContentLoaded', function() {
            // Form validation + auth handlers
            ['loginFormSubmit', 'otpFormSubmit'].forEach(formId => {
                const form = document.getElementById(formId);
                if (form) {
                    form.addEventListener('submit', function(e) {
                        if (!this.checkValidity()) {
                            e.preventDefault();
                            e.stopPropagation();
                        } else {
                            // Call AuthManager after validation passes
                            e.preventDefault();
                            AuthManager.login(e);
                        }
                        this.classList.add('was-validated');
                    }, false);
                }
            });
        });
        
        // Auto-init auth
        AuthManager.checkAuthStatus();
    </script>
</body>
</html>
