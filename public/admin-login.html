<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Belleful</title>
    <!-- Same CDNs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-primary min-vh-100 d-flex align-items-center">
    <!-- Back Navigation -->
    <a href="login.html" class="position-fixed top-4 start-4 btn btn-light btn-lg shadow-lg z-3 animate__animated animate__fadeInLeft" title="Back to User Login">
        <i class="fas fa-arrow-left me-2"></i>Back
    </a>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7 col-12" data-aos="fade-up" data-aos-duration="1000">
                <div class="card border-0 shadow-xl rounded-5 overflow-hidden bg-white">
                    <div class="card-body p-5 text-center">
                        <!-- Admin Header -->
                        <div class="hero-icon-admin mb-5 mx-auto">
                            <i class="fas fa-user-shield fa-5x text-primary"></i>
                        </div>
                        <h2 class="display-5 fw-bold text-dark mb-4">Admin Portal</h2>
                        <p class="lead text-muted mb-5">Secure access for restaurant management</p>

                        <!-- Admin Auth Tabs -->
                        <ul class="nav nav-pills nav-fill mb-4" id="adminAuthTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active rounded-pill px-4 py-2 fw-bold" id="admin-login-tab" data-bs-toggle="pill" data-bs-target="#admin-login-form">
                                    <i class="fas fa-sign-in-alt me-2"></i>Login
                                </button>
                            </li>
                        <!--    <li class="nav-item" role="presentation">
                                <button class="nav-link rounded-pill px-4 py-2 fw-bold" id="admin-register-tab" data-bs-toggle="pill" data-bs-target="#admin-register-form">
                                    <i class="fas fa-user-plus me-2"></i>Register
                                </button>-->
                            </li>
                        </ul>

                        <!-- Tab Content -->
                        <div class="tab-content" id="adminAuthContent">
                            <!-- Admin Login -->
                            <div class="tab-pane fade show active" id="admin-login-form" role="tabpanel">
                                <div id="loginForm">
                                    <form id="loginFormSubmit" novalidate>
                                        <div class="mb-4">
                                            <label for="adminLoginEmail" class="form-label fw-bold fs-5">Admin Email</label>
                                            <div class="input-group input-group-lg">
                                                <span class="input-group-text bg-light">
                                                    <i class="fas fa-envelope text-primary"></i>
                                                </span>
                                                <input type="email" class="form-control form-control-lg" id="adminLoginEmail" 
                                                       placeholder="admin@belleful.com" required>
                                            </div>
                                            <div class="invalid-feedback"></div>
                                        </div>
                                        <div class="mb-5">
                                            <label for="adminLoginPassword" class="form-label fw-bold fs-5">Password</label>
                                            <div class="input-group input-group-lg">
                                                <span class="input-group-text bg-light">
                                                    <i class="fas fa-lock text-primary"></i>
                                                </span>
                                                <input type="password" class="form-control form-control-lg" id="adminLoginPassword"
                                                       placeholder="Enter secure password" required>
                                            </div>
                                            <div class="invalid-feedback"></div>
                                        </div>
                                        <button type="submit" id="loginSubmitBtn" class="btn btn-primary w-100 btn-lg py-4 fw-bold shadow-lg add-to-cart-btn">
                                            <i class="fas fa-sign-in-alt me-2"></i>Admin Login
                                        </button>
                                    </form>
                                </div>
                            </div>

                            <!-- Admin Register -->
                            <div class="tab-pane fade" id="admin-register-form" role="tabpanel">
                                <form id="adminRegisterForm" novalidate>
                                    <div class="mb-4">
                                        <label for="adminRegisterName" class="form-label fw-bold fs-5">Full Name</label>
                                        <input type="text" class="form-control form-control-lg" id="adminRegisterName"
                                               placeholder="Enter your full name" required>
                                        <div class="invalid-feedback"></div>
                                    </div>
                                    <div class="mb-4">
                                        <label for="adminRegisterEmail" class="form-label fw-bold fs-5">Admin Email</label>
                                        <div class="input-group input-group-lg">
                                            <span class="input-group-text bg-light">
                                                <i class="fas fa-envelope text-primary"></i>
                                            </span>
                                            <input type="email" class="form-control form-control-lg" id="adminRegisterEmail"
                                                   placeholder="admin@belleful.com" required>
                                        </div>
                                        <div class="invalid-feedback"></div>
                                    </div>
                                    <div class="mb-5">
                                        <label for="adminRegisterPassword" class="form-label fw-bold fs-5">Password</label>
                                        <div class="input-group input-group-lg">
                                            <span class="input-group-text bg-light">
                                                <i class="fas fa-lock text-primary"></i>
                                            </span>
                                            <input type="password" class="form-control form-control-lg" id="adminRegisterPassword"
                                                   placeholder="Minimum 6 characters" minlength="6" required>
                                        </div>
                                        <div class="invalid-feedback"></div>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100 btn-lg py-4 fw-bold shadow-lg">
                                        <i class="fas fa-user-plus me-2"></i>Create Admin Account
                                    </button>
                                </form>
                                <div class="alert alert-warning mt-4" role="alert">
                                    <i class="fas fa-info-circle me-2"></i>
                                    <strong>Note:</strong> Admin registration requires email verification via OTP.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Links -->
                <div class="text-center mt-4">
                    <a href="login.html" class="text-muted text-decoration-none">
                        ← Back to User Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/constants.js"></script>
    <script>
        AOS.init({ duration: 1200, once: true });
        
        // Set admin mode
        localStorage.setItem('authMode', 'admin');
        
        // Form handlers - now using auth.js
        
        // Enhanced form handlers with AuthManager
        document.addEventListener('DOMContentLoaded', function() {
            // Form validation + auth handlers
            ['loginFormSubmit', 'adminRegisterForm'].forEach(formId => {
                const form = document.getElementById(formId);
                if (form) {
                    form.addEventListener('submit', function(e) {
                        if (!this.checkValidity()) {
                            e.preventDefault();
                            e.stopPropagation();
                        } else {
                            // Call AuthManager after validation passes
                            const submitBtn = document.getElementById('loginSubmitBtn');
                            AuthManager.login(e, submitBtn);
                        }
                        this.classList.add('was-validated');
                    }, false);
                }
            });
            
            // Auto-init auth handled by auth.js
        });
    </script>
</body>
</html>
