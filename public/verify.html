<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Belleful</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-wine/50 via-gold/20 to-wine font-opensans text-white min-h-screen">
    <!-- Nav same structure -->
    <nav class="fixed top-0 w-full bg-wine/95 backdrop-blur-md z-50 shadow-lg transition-all duration-500" id="nav">
        <!-- Identical nav HTML as login.html for consistency -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-utensils text-gold text-3xl"></i>
                    <a href="index.html" class="text-2xl font-playfair text-gold font-bold hover:text-amber-500 transition-colors">Belleful</a>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="menu.html" class="text-white hover:text-gold transition-colors px-3 py-2 rounded-lg hover:bg-gold/20" title="Menu">Menu</a>
                    <a href="cart.html" class="text-white hover:text-gold transition-colors px-3 py-2 rounded-lg hover:bg-gold/20" title="Cart">Cart</a>
                    <a href="orders.html" class="text-white hover:text-gold transition-colors px-3 py-2 rounded-lg hover:bg-gold/20" title="Orders">Orders</a>
                    <button id="search-toggle" class="text-white hover:text-gold p-2 rounded-lg hover:bg-gold/20 transition-all text-xl" title="Search dishes" aria-label="Search">
                        <i class="fas fa-search"></i>
                    </button>
                    <div id="user-nav" class="flex items-center space-x-2 bg-green-500 text-white px-4 py-2 rounded-lg font-semibold hidden">
                        <i class="fas fa-user-check"></i>
                        <span id="user-name">User</span>
                        <button id="logout-btn" class="ml-2 text-white hover:text-yellow-200" title="Logout" aria-label="Logout"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                    <a href="login.html" id="login-link" class="bg-gold text-wine px-6 py-2 rounded-lg font-semibold hover:bg-amber-400 transition-all flex items-center space-x-2 shadow-lg">Login</a>
                </div>
                <div class="md:hidden">
                    <button id="mobile-menu-btn" class="text-white text-2xl" aria-label="Toggle mobile menu" title="Menu">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
            <div id="mobile-menu" class="md:hidden hidden bg-wine/95 pb-4">
                <a href="menu.html" class="block px-6 py-2 text-white hover:text-gold" title="Menu">Menu</a>
                <a href="cart.html" class="block px-6 py-2 text-white hover:text-gold" title="Cart">Cart</a>
                <a href="orders.html" class="block px-6 py-2 text-white hover:text-gold" title="Orders">Orders</a>
                <a href="login.html" id="mobile-login-link" class="block px-6 py-2 text-white hover:text-gold flex items-center space-x-3 bg-gold text-wine px-4 py-2 rounded-lg mx-4 mb-2">
                    <i class="fas fa-user"></i> <span>Login</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Verify Section -->
    <section class="min-h-screen flex items-center justify-center pt-24 px-4">
        <div class="max-w-md w-full bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-gold/30">
            <div class="text-center mb-10">
                <i class="fas fa-shield-check text-green-500 text-5xl mb-4 animate-bounce"></i>
                <h1 class="text-3xl font-playfair font-bold text-wine mb-4">Verify Email</h1>
                <p class="text-gray-600 mb-4">Enter the 6-digit OTP sent to your email</p>
                <p class="text-sm text-gray-500">OTP expires in 10 minutes</p>
            </div>
            <form id="verify-form" class="space-y-6">
                <div>
                    <label class="block text-wine font-semibold mb-2">Email</label>
                    <input type="email" id="verify-email" required class="w-full bg-gray-100 text-gray-800 px-4 py-3 rounded-xl focus:ring-gold focus:ring-2" placeholder="your@email.com">
                </div>
                <div>
                    <label class="block text-wine font-semibold mb-2">OTP Code</label>
                    <div class="flex space-x-2">
                        <input type="text" maxlength="1" class="flex-1 bg-gray-100 text-center text-2xl font-bold text-gray-800 px-2 py-4 rounded-xl focus:ring-gold focus:ring-2 focus:outline-none" pattern="[0-9]" required>
                        <input type="text" maxlength="1" class="flex-1 bg-gray-100 text-center text-2xl font-bold text-gray-800 px-2 py-4 rounded-xl focus:ring-gold focus:ring-2 focus:outline-none" pattern="[0-9]" required>
                        <input type="text" maxlength="1" class="flex-1 bg-gray-100 text-center text-2xl font-bold text-gray-800 px-2 py-4 rounded-xl focus:ring-gold focus:ring-2 focus:outline-none" pattern="[0-9]" required>
                        <input type="text" maxlength="1" class="flex-1 bg-gray-100 text-center text-2xl font-bold text-gray-800 px-2 py-4 rounded-xl focus:ring-gold focus:ring-2 focus:outline-none" pattern="[0-9]" required>
                        <input type="text" maxlength="1" class="flex-1 bg-gray-100 text-center text-2xl font-bold text-gray-800 px-2 py-4 rounded-xl focus:ring-gold focus:ring-2 focus:outline-none" pattern="[0-9]" required>
                        <input type="text" maxlength="1" class="flex-1 bg-gray-100 text-center text-2xl font-bold text-gray-800 px-2 py-4 rounded-xl focus:ring-gold focus:ring-2 focus:outline-none" pattern="[0-9]" required>
                    </div>
                    <p class="text-xs text-gray-500 mt-2 text-center">Didn't receive OTP? <a href="#" id="resend-otp" class="text-gold font-semibold hover:underline">Resend</a></p>
                </div>
                <button type="submit" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold text-lg shadow-xl hover:bg-green-600 transition-all">
                    <span id="verify-btn-text">Verify OTP</span>
                    <span id="verify-loading" class="hidden">Verifying...</span>
                </button>
            </form>
            <div class="mt-6 text-center">
                <a href="login.html" class="text-wine hover:text-gold">Back to Login</a>
            </div>
        </div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
