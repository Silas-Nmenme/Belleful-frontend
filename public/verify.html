<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Belleful</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts - Belleful -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            /* Belleful Theme - Wine/Gold */
            --primary: #B91C52;
            --primary-dark: #A01746;
            --accent: #F59E0B;
            --accent-dark: #D97706;
            --cream: #FDF4F0;
            --gray-100: #F3F4F6;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --shadow-lg: 0 20px 25px -5px rgba(0, 0,0, 0.1), 0 10px 10px -5px rgba(0, 0,0, 0.04);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0,0, 0.25);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, #FEF3E8 50%, #FFF7ED 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--gray-700);
        }

        /* Navbar */
        .navbar-enhanced {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(185, 28, 82, 0.2);
            box-shadow: var(--shadow-lg);
        }

        /* Container */
        .container-main {
            display: flex;
            min-height: 100vh;
            padding-top: 80px;
        }

        .welcome-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        .welcome-content {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
        }

        .welcome-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .welcome-content p {
            font-size: 1.1rem;
            color: var(--gray-600);
            line-height: 1.6;
        }

        .verify-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-shadow: 0 4px 8px rgba(245, 158, 11, 0.3);
        }

        .form-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: var(--transition);
        }

        .form-container:hover {
            transform: translateY(-4px);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.2);
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        label {
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: block;
            color: var(--gray-700);
        }

        .form-control {
            padding: 1rem 1.25rem;
            border-radius: 16px;
            border: 2px solid rgba(185, 28, 82, 0.1);
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.9);
            color: var(--gray-700);
            margin-bottom: 1.5rem;
            width: 100%;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .otp-input {
            letter-spacing: 0.6rem;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Open Sans', monospace;
            text-align: center;
            text-transform: uppercase;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(185, 28, 82, 0.15);
            transform: translateY(-2px);
        }

        .btn-verify {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            box-shadow: 0 8px 25px rgba(185, 28, 82, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-verify:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(185, 28, 82, 0.4);
        }

        .btn-verify:active {
            transform: translateY(-1px);
        }

        .resend-section {
            text-align: center;
            margin: 1.5rem 0;
        }

        .resend-timer {
            color: var(--gray-600);
            font-size: 0.95rem;
        }

        .resend-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .resend-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--gray-600);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link a:hover {
            color: var(--accent);
        }

        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 16px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 9999;
            box-shadow: var(--shadow-xl);
            min-width: 300px;
            text-align: center;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }

        .floating-icon {
            position: absolute;
            top: -20px;
            right: 20px;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(185,28,82,0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--accent);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container-main {
                flex-direction: column;
                padding-top: 100px;
            }
            .welcome-section {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.2);
                padding: 2rem 1rem;
            }
            .form-container {
                margin: 1rem;
                padding: 2rem;
            }
            .welcome-content h1 {
                font-size: 2rem;
            }
        }

        /* Dark Theme Support (optional toggle) */
        body[data-theme="dark"] {
            --cream: #1f2937;
            --gray-700: #f9fafb;
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
        }
    </style>
</head>
<body>

    <!-- Navbar - Consistent with login.html -->
    <nav class="navbar navbar-expand-lg navbar-enhanced fixed-top shadow-lg" id="main-navbar">
        <div class="container">
            <a class="navbar-brand fs-2 fw-bold" href="index.html" style="color: var(--primary);">
                <img src="../asset/logo.jpeg" alt="Belleful Logo" style="height: 50px; width: auto;">
                <span>Belleful</span>
            </a>
            <button class="navbar-toggler border-0 p-2 rounded shadow-sm" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars" style="color: var(--accent); font-size: 1.5rem;"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="menu.html"><i class="fas fa-utensils me-1"></i>Menu</a></li>
                    <li class="nav-item position-relative">
                        <a class="nav-link" href="cart.html">
                            <i class="fas fa-shopping-cart me-1"></i>Cart
                            <span class="cart-badge d-none bg-accent text-white rounded-circle px-2 py-1 small" id="cart-count">0</span>
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-box me-1"></i>Orders</a></li>
                    <li class="nav-item mx-2">
                        <button class="btn btn-outline-warning btn-sm px-3 rounded-pill shadow-sm" id="search-toggle">
                            <i class="fas fa-search"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html"><i class="fas fa-sign-in-alt me-1"></i>Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-main">
        <!-- Welcome Section -->
        <div class="welcome-section">
            <div class="welcome-content">
                <div class="verify-icon">
                    <i class="fas fa-shield-check"></i>
                </div>
                <h1>Secure Verification</h1>
                <p>Enter the 6-digit code sent to your email to verify your Belleful account. Code expires in 10 minutes.</p>
            </div>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <div class="form-container position-relative">
                <div class="floating-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h2 class="form-title">Verify OTP</h2>
                
                <!-- Hidden email input for app.js -->
                <input type="hidden" id="verify-email" name="email">
                
                <form id="verify-form">
                    <label for="otp">6-Digit Verification Code</label>
                    <input type="text" 
                           class="form-control otp-input" 
                           id="otp" 
                           name="otp" 
                           required 
                           placeholder="Enter code"
                           maxlength="6" 
                           pattern="[0-9]{6}"
                           inputmode="numeric"
                           autocomplete="one-time-code">
                    
                    <button type="submit" class="btn-verify">
                        <span id="verify-btn-text">Verify Code</span>
                        <div id="verify-loading" class="spinner-border spinner-border-sm d-none ms-2" role="status">
                            <span class="visually-hidden">Verifying...</span>
                        </div>
                    </button>
                </form>
                
                <div class="resend-section">
                    <p class="resend-timer" id="resend-timer">
                        Didn't receive? <span id="timer">60</span>s
                    </p>
                    <a href="#" class="resend-link d-none" id="resend-link">Resend Code</a>
                </div>
                
                <div class="footer-link">
                    <a href="login.html"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Smooth OTP logic from provided code, adapted for single field
        document.addEventListener('DOMContentLoaded', function() {
            const otpInput = document.getElementById('otp');
            const form = document.getElementById('verify-form');
            const verifyBtnText = document.getElementById('verify-btn-text');
            const verifyLoading = document.getElementById('verify-loading');
            const resendLink = document.getElementById('resend-link');
            const timerEl = document.getElementById('timer');
            const emailInput = document.getElementById('verify-email');
            const emailDisplay = document.querySelector('.welcome-content p'); // Update if needed

            // Prefill email from query/localStorage
            const urlParams = new URLSearchParams(window.location.search);
            let email = urlParams.get('email') || localStorage.getItem('verify-email');
            if (email) {
                emailInput.value = email;
                // Display email
                if (emailDisplay) {
                    emailDisplay.innerHTML = `<strong>${email}</strong>`;
                }
            }

            let countdown = 60;
            let countdownInterval;

            // OTP input handlers
            otpInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '').slice(0, 6);
                e.target.value = value.toUpperCase();
                
                // Auto-submit if full
                if (value.length === 6) {
                    form.requestSubmit();
                }
            });

            // Paste handler
            otpInput.addEventListener('paste', function(e) {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text');
                const code = paste.replace(/\D/g, '').slice(0, 6);
                setTimeout(() => {
                    otpInput.value = code.toUpperCase();
                    if (code.length === 6) {
                        form.requestSubmit();
                    }
                }, 10);
            });

            // Form submit - integrates with app.js
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const otp = otpInput.value.replace(/\D/g, '');
                if (otp.length !== 6) {
                    showToast('Please enter full 6-digit code', 'error');
                    return;
                }

                verifyBtnText.style.display = 'none';
                verifyLoading.classList.remove('d-none');

                try {
                    // app.js verifyOTP will handle
                    await verifyOTP(emailInput.value, otp);
                } catch (error) {
                    showToast('Verification failed. Please try again.', 'error');
                } finally {
                    verifyBtnText.style.display = 'inline';
                    verifyLoading.classList.add('d-none');
                }
            });

            // Resend
            resendLink.addEventListener('click', function(e) {
                e.preventDefault();
                // Simulate resend
                showToast('Code resent to your email!');
                startCountdown();
            });

            function startCountdown() {
                resendLink.classList.add('d-none');
                countdown = 60;
                countdownInterval = setInterval(() => {
                    countdown--;
                    timerEl.textContent = countdown;
                    if (countdown <= 0) {
                        clearInterval(countdownInterval);
                        resendLink.classList.remove('d-none');
                    }
                }, 1000);
            }

            function showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }

            // Start timer
            startCountdown();
        });
    </script>
</body>
</html>
