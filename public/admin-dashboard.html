<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Belleful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-gradient-primary shadow-lg">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-4" href="#">
                <i class="fas fa-user-shield me-2"></i>Admin Dashboard
            </a>
            <div class="navbar-nav">
                <a class="nav-link" href="user-dashboard.html">User Dash</a>
                <a class="nav-link" href="index.html">Site</a>
                <button class="btn btn-outline-light ms-3" onclick="AuthManager.logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-5 mt-5 min-vh-100 bg-light">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-2 col-md-3 p-0">
                <div class="card h-100 border-0 shadow-lg">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4 border-bottom pb-3">
                            <i class="fas fa-bars me-2"></i>Menu
                        </h5>
                        <ul class="nav flex-column">
                            <li class="nav-item">
                                <a class="nav-link active" href="#stats">
                                    <i class="fas fa-chart-bar me-2"></i>Dashboard
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#orders-admin">
                                    <i class="fas fa-list me-2"></i>Orders
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#users-admin">
                                    <i class="fas fa-users me-2"></i>Users
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#menu-admin">
                                    <i class="fas fa-utensils me-2"></i>Menu Items
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-lg-10 col-md-9">
                <!-- Stats -->
                <section id="stats" class="mb-5">
                    <div class="row g-4 mb-5" id="adminStats">
                        <!-- Stats loaded here -->
                    </div>
                </section>

                <!-- Pending Orders -->
                <section id="orders-admin">
                    <div class="card shadow-xl border-0 rounded-4 mb-5">
                        <div class="card-header bg-danger text-white">
                            <h4 class="mb-0 fw-bold">
                                <i class="fas fa-clock me-2"></i>Pending Orders 
                                <span class="badge bg-light text-danger ms-2" id="pendingCount">0</span>
                            </h4>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Customer</th>
                                            <th>Items</th>
                                            <th>Total</th>
                                            <th>Payment</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="pendingOrdersTable">
                                        <!-- Pending orders -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Users Table -->
                <section id="users-admin">
                    <div class="card shadow-lg border-0 rounded-4">
                        <div class="card-header bg-info text-white">
                            <h4 class="mb-0 fw-bold">
                                <i class="fas fa-users me-2"></i>Users
                            </h4>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Email</th>
                                            <th>Role</th>
                                            <th>Orders</th>
                                            <th>Joined</th>
                                        </tr>
                                    </thead>
                                    <tbody id="usersTable">
                                        <!-- Users loaded here -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/auth.js"></script>
    <script>
        AOS.init();
        
        // Load admin dashboard on auth
        async function initAdminDashboard() {
            if (!localStorage.getItem('token') || localStorage.getItem('userRole') !== 'admin') {
                window.location.href = 'admin-login.html';
                return;
            }
            
            await DashboardManager.loadAdminDashboard();
        }
        
        initAdminDashboard();
        
        // Quick order status update
        window.quickApproveOrder = async function(orderId) {
            if (confirm('Approve this payment?')) {
                const token = localStorage.getItem('token');
                const res = await fetch(`${API_BASE}/orders/${orderId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ orderStatus: 'vendor_approved', paymentStatus: 'paid' })
                });
                
                if (res.ok) {
                    showToast('Order approved!', 'success');
                    initAdminDashboard(); // Refresh
                }
            }
        };
        
        function showToast(msg, type) {
            const toast = document.createElement('div');
            // Simplified toast
            console.log(`${type.toUpperCase()}: ${msg}`);
        }
    </script>
</body>
</html>
