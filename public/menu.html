<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Belleful</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-cream-gradient">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-enhanced navbar-wine fixed-top shadow-lg" id="main-navbar">
        <div class="container-xl">
            <a class="navbar-brand text-wine fs-2 fw-bold" href="index.html">
                <img src="../asset/logo.jpeg" alt="Belleful Logo" class="img-fluid" style="height: 50px;">
                <span>Belleful</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars text-warning fs-3"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-wine" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link text-wine" href="cart.html">Cart</a></li>
                    <li class="nav-item"><a class="nav-link text-wine" href="orders.html">Orders</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Menu Content -->
    <main class="container-xl my-5 pt-5">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center mb-5">Full Menu</h1>
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                    <div class="col">
                        <div class="card h-100">
                            <img src="../asset/jollof.webp" class="card-img-top img-fluid" alt="Jollof Rice">
                            <div class="card-body">
                                <h3 class="card-title">Jollof Rice</h3>
                                <p class="card-text">₦2500</p>
                                <button class="btn btn-warning w-100">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                    <!-- Add more menu items -->
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
