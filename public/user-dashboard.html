<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Belleful</title>
    <!-- CDNs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Protected navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-gradient-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="user-dashboard.html">
                <i class="fas fa-utensils"></i> Belleful Dashboard
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="cart.html">Cart</a>
                <button class="btn btn-outline-light ms-2" onclick="AuthManager.logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-5 mt-5">
        <!-- Stats Cards -->
        <div class="row mb-5 g-4" id="statsCards">
            <!-- Stats loaded dynamically -->
        </div>

        <!-- Menu Section - Primary for logged-in ordering -->
        <section id="menu" class="py-5">
            <div class="row mb-5">
                <div class="col-lg-8 mx-auto text-center">
                    <h2 class="display-5 fw-bold text-primary mb-4">
                        <i class="fas fa-utensils me-2"></i>Your Menu
                    </h2>
                    <p class="lead text-muted">Continue ordering your favorites</p>
                </div>
            </div>
            <div class="menu-loading text-center py-5">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-muted h6">Loading delicious menu...</p>
            </div>
            <div class="row g-4" id="menuGrid" style="display: none;">
                <!-- Menu cards loaded by menu.js -->
            </div>
        </section>

        <!-- Recent Orders -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-light">
                        <h4 class="mb-0 fw-bold">
                            <i class="fas fa-list me-2 text-primary"></i>Recent Orders
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Order ID</th>
                                        <th>Items</th>
                                        <th>Total</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="ordersTableBody">
                                    <!-- Orders loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script>
        AOS.init();
        
        // Enhanced auth check + dashboard load
        document.addEventListener('DOMContentLoaded', async function() {
            // Simple auth check - no checkAuthStatus to avoid redirect loop


            
            // Use new local DB dashboard system
            AuthManager.checkAuthStatus();
            DashboardManager.loadUserDashboard();
            DashboardManager.renderUserOrders();
        });

    </script>
</body>
</html>
