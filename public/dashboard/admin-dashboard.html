<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belleful - Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    :root { 
      --primary: #B91C52; 
      --gold: #F59E0B; 
      --cream: #FDF4F0; 
      --dark: #1f2937;
      --glass: rgba(255,255,255,0.25);
      --shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    body { background: linear-gradient(135deg, var(--cream), #f5f5f5); min-height: 100vh; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: var(--shadow); }
    .sidebar { background: linear-gradient(180deg, rgba(253,244,240,0.95), rgba(255,255,255,0.9)); border-right: 1px solid rgba(0,0,0,0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); height: 100vh; }
    .nav-link { border-radius: 12px; margin-bottom: 8px; transition: all 0.3s; }
    .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, var(--primary), #e21e62); color: white !important; transform: translateX(5px); box-shadow: var(--shadow); }
    .stats-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--glass); box-shadow: var(--shadow); transition: transform 0.3s; }
    .stats-card:hover { transform: translateY(-5px); }
    .stats-icon { font-size: 2.5rem; opacity: 0.8; }
    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .loading, .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid var(--glass); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .table { background: rgba(255,255,255,0.8); border-radius: 15px; overflow: hidden; box-shadow: var(--shadow); }
    .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .empty-state { text-align: center; color: #6b7280; padding: 4rem 2rem; }
    .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; border-radius: 12px; padding: 1rem 1.5rem; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: var(--shadow); }
    @media (max-width: 768px) { .sidebar { transform: translateX(-100%); transition: transform 0.3s; } .sidebar.show { transform: translateX(0); } }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="d-flex justify-content-center align-items-center position-fixed w-100 h-100 bg-white" style="z-index: 9999; top:0; left:0;">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
  </div>

  <div class="d-flex">
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar col-md-2 col-lg-1 p-4 overflow-auto">
      <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
        <img src="../asset/logo.jpeg" alt="Belleful" style="height: 35px; width: 35px; border-radius: 50%;">
        <span class="ms-2 fw-bold fs-5 text-dark d-none d-md-inline">Admin Panel</span>
      </div>
      <nav class="nav flex-column">
        <a href="#" class="nav-link active" data-section="stats"><i class="fas fa-chart-line me-2"></i>Dashboard</a>
        <a href="#" class="nav-link" data-section="users"><i class="fas fa-users me-2"></i>Users</a>
        <a href="#" class="nav-link" data-section="orders"><i class="fas fa-box me-2"></i>Orders</a>
        <a href="#" class="nav-link text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
      </nav>
      <button class="btn btn-link d-md-none position-absolute top-0 end-0 m-3" id="closeSidebar" aria-label="Close sidebar" title="Close navigation menu"><i class="fas fa-times fs-4"></i></button>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-0">
      <!-- Navbar -->
      <nav class="navbar navbar-expand-lg px-4 py-3">
        <div class="container-fluid">
          <button class="btn btn-link d-md-none me-2" id="toggleSidebar" aria-label="Toggle sidebar" title="Toggle navigation menu"><i class="fas fa-bars fs-4"></i></button>
          <span class="navbar-brand mb-0 h1 fw-bold text-dark">
            <i class="fas fa-tachometer-alt me-2 text-warning"></i>Admin Dashboard
          </span>
          <div class="ms-auto d-flex align-items-center">
            <span id="adminGreeting" class="me-3 fw-semibold text-dark d-none d-lg-inline">Welcome Admin!</span>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
          </div>
        </div>
      </nav>

      <!-- Main Content Area -->
      <main class="container-fluid p-4 p-lg-5">
        <!-- Dashboard Stats Section -->
        <section id="statsSection" class="section active">
          <div class="row g-4 mb-5">
            <div class="col-lg-3 col-md-6">
              <div class="stats-card p-4 text-center h-100">
                <i class="fas fa-shopping-bag stats-icon text-warning mb-3"></i>
                <h3 id="totalOrders">0</h3>
                <p class="text-muted mb-0">Total Orders</p>
              </div>
            </div>
            <div class="col-lg-3 col-md-6">
              <div class="stats-card p-4 text-center h-100">
                <i class="fas fa-coins stats-icon text-success mb-3"></i>
                <h3 id="totalRevenue">₦0</h3>
                <p class="text-muted mb-0">Total Revenue</p>
              </div>
            </div>
            <div class="col-lg-3 col-md-6">
              <div class="stats-card p-4 text-center h-100">
                <i class="fas fa-users stats-icon text-primary mb-3"></i>
                <h3 id="totalUsers">0</h3>
                <p class="text-muted mb-0">Total Users</p>
              </div>
            </div>
            <div class="col-lg-3 col-md-6">
              <div class="stats-card p-4 text-center h-100">
                <i class="fas fa-utensils stats-icon text-info mb-3"></i>
                <h3 id="activeMenuItems">0</h3>
                <p class="text-muted mb-0">Menu Items</p>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <div class="card stats-card p-4">
                <h5 class="mb-3">Recent Orders</h5>
                <div id="recentOrdersList" class="list-group list-group-flush">
                  <!-- Recent orders populated here -->
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Users Section -->
        <section id="usersSection" class="section">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0"><i class="fas fa-users me-2 text-info"></i>Users</h2>
            <div>
              <input type="text" id="usersSearch" class="form-control me-2" style="width: 250px; display: inline-block;" placeholder="Search users...">
              <button class="btn btn-outline-primary me-2" onclick="loadUsers()">Refresh</button>
              <select id="usersPageSize" class="form-select" style="width: 100px; display: inline-block;">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
              </select>
            </div>
          </div>
          <div id="usersContent">
            <div class="loading-spinner mx-auto py-5 d-block"></div>
          </div>
          <div id="usersPagination" class="text-center mt-4"></div>
        </section>

        <!-- Orders Section -->
        <section id="ordersSection" class="section">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0"><i class="fas fa-box me-2 text-warning"></i>Orders</h2>
            <div>
              <input type="text" id="ordersSearch" class="form-control me-2" style="width: 250px; display: inline-block;" placeholder="Search orders...">
              <select id="ordersStatus" class="form-select me-2" style="width: 150px; display: inline-block;">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="delivered">Delivered</option>
              </select>
              <button class="btn btn-outline-primary me-2" onclick="loadAdminOrders()">Refresh</button>
              <select id="ordersPageSize" class="form-select" style="width: 100px; display: inline-block;">
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
          </div>
          <div id="ordersContent">
            <div class="loading-spinner mx-auto py-5 d-block"></div>
          </div>
          <div id="ordersPagination" class="text-center mt-4"></div>
        </section>
      </main>
    </div>
  </div>

  <script>
    // Config - auto-detect hosting
    const API_BASE = window.location.hostname.includes('netlify') ? 'https://bellefulchop.netlify.app/api/dashboard' : 'https://belleful-fphf.vercel.app/api/dashboard';
    console.log('Admin API base:', API_BASE);

    // Auth Utils
    function getAuthToken() { return localStorage.getItem('token'); }
    function getUserInfo() {
      const token = getAuthToken();
      if (!token) return null;
      try {
        return JSON.parse(atob(token.split('.')[1]));
      } catch { return null; }
    }
    function logout() {
      localStorage.removeItem('token');
      window.location.href = '../login.html';
    }
    function authGuard() {
      const token = getAuthToken();
      console.log('Admin auth token:', token ? 'Present (len: ' + token.length + ')' : 'Missing');
      if (!token) {
        logout();
        return false;
      }
      const user = getUserInfo();
      if (user.role !== 'admin') {
        console.warn('Not admin role:', user.role);
        showToast('Admin access required', 'error');
        setTimeout(() => logout(), 2000);
        return false;
      }
      return true;
    }

    // UI Utils
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast alert alert-${type === 'success' ? 'success' : 'danger'} shadow-lg`;
      toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'} me-2"></i>${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }
    function setLoading(containerId, show = true) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const spinner = '<div class="loading mx-auto py-5 d-block" style="width: 40px; height: 40px;"></div>';
      container.innerHTML = show ? spinner : '';
    }

    // API Calls
    async function apiCall(endpoint, options = {}) {
      const token = getAuthToken();
      if (!token) return { success: false, error: 'No token' };
      console.log(`Admin API: ${API_BASE}${endpoint}`);
      try {
        const res = await fetch(`${API_BASE}${endpoint}`, {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          ...options
        });
        const data = await res.json();
        console.log(endpoint, res.status, data);
        if (!res.ok || !data.success) throw new Error(data.message || `HTTP ${res.status}`);
        return data;
      } catch (error) {
        console.error(endpoint, error);
        showToast(error.message, 'error');
        return { success: false, data: null };
      }
    }

    // Load Stats (/admin/stats)
    async function loadStats() {
      setLoading('statsGrid', true);
      const { data } = await apiCall('/admin/stats');
      if (!data) return;
      
      document.getElementById('totalOrders').textContent = data.totalOrders;
      document.getElementById('totalRevenue').textContent = `₦${data.totalRevenue?.toLocaleString() || 0}`;
      document.getElementById('totalUsers').textContent = data.totalUsers;
      document.getElementById('activeMenuItems').textContent = data.activeMenuItems;

      // Recent orders
      const recentList = document.getElementById('recentOrdersList');
      recentList.innerHTML = data.recentOrders?.slice(0,5).map(order => `
        <a href="#" class="list-group-item list-group-item-action" onclick="showOrderDetail('${order._id}')">
          #${order._id.slice(-6)} - ${order.user?.name} - ₦${order.totalAmount?.toLocaleString()}
          <small class="d-block text-muted">${new Date(order.createdAt).toLocaleDateString()}</small>
        </a>
      `).join('') || '<p class="text-muted">No recent orders</p>';
    }

    // Load Users (/admin/users)
    async function loadUsers(page = 1, limit = 10, search = '') {
      setLoading('usersContent', true);
      const params = new URLSearchParams({ page, limit, ...(search && { search }) });
      const { data, total, pages, count } = await apiCall(`/admin/users?${params}`);
      if (!data) return;

      const container = document.getElementById('usersContent');
      container.innerHTML = `
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr><th>Name</th><th>Email</th><th>Phone</th><th>Orders</th><th>Joined</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
              ${data.map(user => `
                <tr>
                  <td><strong>${user.name}</strong></td>
                  <td>${user.email}</td>
                  <td>${user.phone || '-'}</td>
                  <td>${user.orderCount || 0}</td>
                  <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                  <td><span class="badge bg-${user.active ? 'success' : 'secondary'}">${user.active ? 'Active' : 'Inactive'}</span></td>
                  <td>
                    <button class="btn btn-sm btn-warning" onclick="editUser('${user._id}')">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteUser('${user._id}')">Delete</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
          <div>Showing ${count} of ${total} users</div>
          <nav aria-label="Users pagination">
            <ul class="pagination">
              <li class="page-item"><a class="page-link" href="#" onclick="loadUsers(${Math.max(1, page-1)})">Previous</a></li>
              <li class="page-item active"><span class="page-link">${page}</span></li>
              <li class="page-item"><a class="page-link" href="#" onclick="loadUsers(${Math.min(pages, page+1)})">Next</a></li>
            </ul>
          </nav>
        </div>
      `;
    }

    // Load Orders (/admin/orders)
    async function loadAdminOrders(page = 1, limit = 20, status = '', search = '') {
      setLoading('ordersContent', true);
      const params = new URLSearchParams({ page, limit, ...(status && { status }), ...(search && { search }) });
      const { data, total, pages } = await apiCall(`/admin/orders?${params}`);
      if (!data) return;

      const container = document.getElementById('ordersContent');
      container.innerHTML = `
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>ID</th><th>User</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th><th>Payment</th><th>Action</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(order => `
                <tr>
                  <td>#${order._id.slice(-6)}</td>
                  <td>${order.user?.name || order.user?.email}</td>
                  <td>${new Date(order.createdAt).toLocaleDateString()}</td>
                  <td>${order.items.length}</td>
                  <td>₦${order.totalAmount?.toLocaleString()}</td>
                  <td><span class="status-badge bg-${order.orderStatus === 'delivered' ? 'success' : 'warning'}">${order.orderStatus}</span></td>
                  <td><span class="badge bg-${order.paymentStatus === 'success' ? 'success' : 'warning'}">${order.paymentStatus}</span></td>
                  <td><button class="btn btn-sm btn-primary" onclick="showOrderDetail('${order._id}')">View</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <div class="text-center mt-4">
          Page ${page} of ${pages || 1} (${data.length} orders)
        </div>
      `;
    }

    // Section switch
    function switchSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      document.getElementById(`${section}Section`).classList.add('active');
      event.target.closest('.nav-link').classList.add('active');

      // Load section data
      switch(section) {
        case 'stats':
          loadStats();
          break;
        case 'users':
          loadUsers(1);
          break;
        case 'orders':
          loadAdminOrders(1);
          break;
      }
    }

    // Init
    document.addEventListener('DOMContentLoaded', async () => {
      console.log('Admin Dashboard loading...');
      if (!authGuard()) return;

      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('adminGreeting').textContent = `Welcome, Admin!`;

      // Event listeners
      document.querySelectorAll('[data-section]').forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          switchSection(link.dataset.section);
        });
      });
      document.getElementById('toggleSidebar').onclick = () => document.getElementById('sidebar').classList.toggle('show');
      document.getElementById('closeSidebar').onclick = () => document.getElementById('sidebar').classList.remove('show');
      
      // Initial load
      switchSection('stats');
    });

    // Placeholder actions
    function showOrderDetail(id) {
      showToast('Order detail view - implement modal', 'info');
    }
    function editUser(id) {
      showToast('Edit user form - implement', 'info');
    }
    function deleteUser(id) {
      if (confirm('Delete user?')) showToast('User deleted', 'success');
    }

    console.log('✅ Admin Dashboard Ready - Matches backend endpoints');
  </script>
</body>
</html>
