<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belleful - Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="container">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-brand">Belleful Admin 👑</div>
      <div>
        <div id="notificationBell" class="notification-bell">🔔 <span id="notifBadge" class="badge" style="display:none;">0</span></div>
        <button id="logoutBtn" class="btn btn-outline-danger ms-2">Logout</button>
      </div>
    </nav>

    <!-- Admin Content -->
    <div id="dashboardContent" style="display: none;">
      <!-- Stats -->
      <div class="row mb-4">
        <div class="col-md-3">
          <div class="card text-center">
            <h3 id="totalOrders">0</h3>
            <p>Total Orders</p>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-center">
            <h3 id="pendingOrders">0</h3>
            <p>Pending</p>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-center">
            <h3 id="preparingOrders">0</h3>
            <p>Preparing</p>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-center">
            <h3 id="deliveredOrders">0</h3>
            <p>Delivered</p>
          </div>
        </div>
      </div>

      <!-- Orders Table -->
      <div class="card">
        <h3>📋 All Orders 
          <select id="statusFilter" class="form-select d-inline w-auto ms-3" style="max-width: 200px;">
            <option value="">All Status</option>
            <option value="ordered">Ordered</option>
            <option value="pending_approval">Pending Approval</option>
            <option value="vendor_approved">Vendor Approved</option>
            <option value="preparing">Preparing</option>
            <option value="ready">Ready</option>
            <option value="off_for_delivery">Off for Delivery</option>
            <option value="delivered">Delivered</option>
          </select>
        </h3>
        <div id="ordersTable"></div>
      </div>

      <!-- Quick Add Menu (Optional) -->
      <div class="card">
        <h5>➕ Quick Add Menu Item</h5>
        <form id="addMenuForm" class="row g-3">
          <div class="col-md-3">
            <input type="text" class="form-control" placeholder="Name" name="name" required>
          </div>
          <div class="col-md-2">
            <input type="number" class="form-control" placeholder="Price" name="price" required>
          </div>
          <div class="col-md-2">
            <select class="form-control" name="category">
              <option value="food">Food</option>
              <option value="drink">Drink</option>
              <option value="side">Side</option>
            </select>
          </div>
          <div class="col-md-3">
            <input type="text" class="form-control" placeholder="Description" name="description">
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-success w-100">Add Item</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Receipt Preview Modal -->
    <div id="receiptModal" class="checkout-modal" style="display: none;">
      <div class="checkout-content">
        <h4>📸 Receipt Preview</h4>
        <img id="receiptImg" src="" alt="Receipt" style="max-width: 100%; border-radius: 10px;">
        <div class="mt-3">
          <button id="closeReceiptModal" class="btn btn-outline-secondary w-100">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
