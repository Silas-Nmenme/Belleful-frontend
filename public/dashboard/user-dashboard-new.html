<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belleful - User Dashboard</title>
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-border" role="status"></div>
  </div>

  <!-- Top Navbar -->
  <nav class="top-navbar">
    <div class="navbar-container">
      <div class="nav-brand">
        <i class="fas fa-utensils me-2"></i>
        Belleful Dashboard
      </div>
      <div class="nav-actions">
        <button id="notificationBtn" class="notification-btn" title="Notifications">
          <i class="fas fa-bell"></i>
          <span id="notifBadge" class="badge">3</span>
        </button>
        <button id="themeToggle" class="theme-toggle" title="Toggle theme">
          <i class="fas fa-moon"></i>
        </button>
        <button id="mobileMenuBtn" class="mobile-menu-btn" title="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <div id="userProfile" class="user-profile">
          <div class="avatar"></div>
          <span id="userName">Loading...</span>
        </div>
        <button id="logoutBtn" class="btn-logout">Logout</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-app">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-nav">
        <a href="#" class="nav-link active" data-tab="stats">
          <i class="fas fa-chart-line"></i> Dashboard
        </a>
        <a href="#" class="nav-link" data-tab="orders">
          <i class="fas fa-box"></i> Orders
        </a>
        <a href="#" class="nav-link" data-tab="profile">
          <i class="fas fa-user"></i> Profile
        </a>
        <a href="#" class="nav-link" data-tab="cart">
          <i class="fas fa-shopping-cart"></i> Cart
        </a>
        <a href="#" class="nav-link" data-tab="payments">
          <i class="fas fa-credit-card"></i> Payments
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="section-header">
        <h1 data-tab="stats">Dashboard Overview</h1>
        <div>
          <select id="ordersStatusFilter" style="display:none">
            <option value="">All Status</option>
            <option value="pending_approval">Pending</option>
            <option value="preparing">Preparing</option>
            <option value="ready">Ready</option>
          </select>
          <button id="refreshBtn" class="btn btn-primary">
            <i class="fas fa-sync-alt"></i> Refresh
          </button>
        </div>
      </div>

      <!-- Stats Tab -->
      <div id="stats" class="tab-content active">
        <div id="statsGrid" class="stats-grid"></div>
      </div>

      <!-- Orders Tab -->
      <div id="orders" class="tab-content">
        <div id="ordersContent" class="table-responsive"></div>
        <div id="ordersPagination"></div>
        <button id="ordersRefreshBtn" class="btn btn-outline-primary" style="display:none">Refresh Orders</button>
      </div>

      <!-- Profile Tab -->
      <div id="profile" class="tab-content">
        <div id="profileContent"></div>
      </div>

      <!-- Cart Tab -->
      <div id="cart" class="tab-content">
        <div id="cartContent"></div>
      </div>

      <!-- Payments Tab -->
      <div id="payments" class="tab-content">
        <div id="paymentsContent"></div>
      </div>
    </main>
  </div>

  <!-- Order Modal -->
  <div id="orderModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Order Details</h3>
        <button class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <h4 id="modalOrderId"></h4>
        <div id="modalOrderContent"></div>
      </div>
    </div>
  </div>

  <!-- Notifications Dropdown -->
  <div id="notificationsDropdown" class="notifications-dropdown">
    <div class="p-3 border-bottom">
      <h6>Notifications</h6>
    </div>
    <div class="p-3">
      <p>No new notifications</p>
    </div>
  </div>

  <!-- Scripts V2 - RECURSION FIXED -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="js/shared-v2.js?v=3"></script>
<script src="js/user-v2.js?v=3"></script>

</body>
</html>
