<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belleful - User Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
    :root { 
      --primary: #B91C52; 
      --gold: #F59E0B; 
      --cream: #FDF4F0; 
      --dark: #1f2937;
      --glass: rgba(255,255,255,0.25);
      --shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    body { background: linear-gradient(135deg, var(--cream), #f5f5f5); min-height: 100vh; }
    .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: var(--shadow); }
    .sidebar { background: linear-gradient(180deg, rgba(253,244,240,0.95), rgba(255,255,255,0.9)); border-right: 1px solid rgba(0,0,0,0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); height: 100vh; }
    .nav-link { border-radius: 12px; margin-bottom: 8px; transition: all 0.3s; }
    .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, var(--primary), #e21e62); color: white !important; transform: translateX(5px); box-shadow: var(--shadow); }
    .stats-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--glass); box-shadow: var(--shadow); transition: transform 0.3s; }
    .stats-card:hover { transform: translateY(-5px); }
    .stats-icon { font-size: 2.5rem; opacity: 0.8; }
    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.loading, .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid var(--glass); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .table { background: rgba(255,255,255,0.8); border-radius: 15px; overflow: hidden; box-shadow: var(--shadow); }
    .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .empty-state { text-align: center; color: #6b7280; padding: 4rem 2rem; }
    .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; border-radius: 12px; padding: 1rem 1.5rem; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: var(--shadow); }
    @media (max-width: 768px) { .sidebar { transform: translateX(-100%); transition: transform 0.3s; } .sidebar.show { transform: translateX(0); } }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="d-flex justify-content-center align-items-center position-fixed w-100 h-100 bg-white" style="z-index: 9999; top:0; left:0;">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
  </div>

  <div class="d-flex">
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar col-md-2 col-lg-1 p-4 overflow-auto">
      <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
        <img src="../asset/logo.jpeg" alt="Belleful" style="height: 35px; width: 35px; border-radius: 50%;">
        <span class="ms-2 fw-bold fs-5 text-dark d-none d-md-inline">Dashboard</span>
      </div>
      <nav class="nav flex-column">
        <a href="#" class="nav-link active" data-section="stats"><i class="fas fa-chart-line me-2"></i>Stats</a>
        <a href="#" class="nav-link" data-section="orders"><i class="fas fa-box me-2"></i>Orders</a>
        <a href="#" class="nav-link" data-section="profile"><i class="fas fa-user me-2"></i>Profile</a>
        <a href="#" class="nav-link" data-section="cart"><i class="fas fa-shopping-cart me-2"></i>Cart</a>
        <a href="#" class="nav-link" data-section="payments"><i class="fas fa-credit-card me-2"></i>Payments</a>
        <a href="#" class="nav-link text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
      </nav>
<button class="btn btn-link d-md-none position-absolute top-0 end-0 m-3" id="closeSidebar" aria-label="Close sidebar" title="Close navigation menu"><i class="fas fa-times fs-4"></i></button>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-0">
      <!-- Navbar -->
      <nav class="navbar navbar-expand-lg px-4 py-3">
        <div class="container-fluid">
<button class="btn btn-link d-md-none me-2" id="toggleSidebar" aria-label="Toggle sidebar" title="Toggle navigation menu"><i class="fas fa-bars fs-4"></i></button>
          <span class="navbar-brand mb-0 h1 fw-bold text-dark">
            <i class="fas fa-tachometer-alt me-2 text-primary"></i>User Dashboard
          </span>
          <div class="ms-auto d-flex align-items-center">
            <span id="userGreeting" class="me-3 fw-semibold text-dark d-none d-lg-inline">Welcome back!</span>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
          </div>
        </div>
      </nav>

      <!-- Main Content Area -->
      <main class="container-fluid p-4 p-lg-5">
        <!-- Stats Section -->
        <section id="statsSection" class="section active">
          <div class="row g-4 mb-5">
            <div class="col-lg-3 col-md-6">
              <div class="stats-card p-4 text-center h-100">
                <i class="fas fa-shopping-bag stats-icon text-warning mb-3"></i>
                <h3 id="totalOrders" class="mb-1">0</h3>
                <p class="text-muted mb-0">Total Orders</p>
              </div>
            </div>
            <div class="col-lg-3 col-md-6">
              <div class="stats-card p-4 text-center h-100">
                <i class="fas fa-coins stats-icon text-success mb-3"></i>
                <h3 id="totalSpent" class="mb-1">₦0</h3>
                <p class="text-muted mb-0">Total Spent</p>
              </div>
            </div>
            <div class="col-lg-3 col-md-6">
              <div class="stats-card p-4 text-center h-100">
                <i class="fas fa-check-circle stats-icon text-primary mb-3"></i>
                <h3 id="completedOrders" class="mb-1">0</h3>
                <p class="text-muted mb-0">Completed</p>
              </div>
            </div>
            <div class="col-lg-3 col-md-6">
              <div class="stats-card p-4 text-center h-100">
                <i class="fas fa-shopping-cart stats-icon text-info mb-3"></i>
                <h3 id="cartTotal" class="mb-1">₦0</h3>
                <p class="text-muted mb-0">Cart Total</p>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <div class="card stats-card p-4">
                <h5 class="mb-3">Quick Actions</h5>
                <div class="d-flex flex-wrap gap-2">
                  <a href="#" class="btn btn-primary px-4 py-2" onclick="switchSection('cart')"><i class="fas fa-shopping-cart me-2"></i>View Cart</a>
                  <a href="#" class="btn btn-outline-primary px-4 py-2" onclick="switchSection('orders')"><i class="fas fa-box me-2"></i>View Orders</a>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Orders Section -->
        <section id="ordersSection" class="section">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0"><i class="fas fa-box me-2 text-warning"></i>Recent Orders</h2>
            <button class="btn btn-outline-primary" onclick="loadSectionData('orders')"><i class="fas fa-refresh me-1"></i>Refresh</button>
          </div>
          <div id="ordersContent">
            <div class="loading-spinner mx-auto py-5 d-block"></div>
          </div>
        </section>

        <!-- Profile Section -->
        <section id="profileSection" class="section">
          <div class="row justify-content-center">
            <div class="col-lg-8">
              <div class="card stats-card p-5 text-center">
                <div class="mb-4">
                  <div class="avatar mx-auto mb-3" style="width: 120px; height: 120px; background: linear-gradient(135deg, var(--primary), var(--gold)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; margin-bottom: 1rem;">
                    <i class="fas fa-user"></i>
                  </div>
                </div>
                <h3 id="profileName" class="mb-2">Loading...</h3>
                <p class="text-muted mb-1" id="profileEmail"></p>
                <p class="text-muted mb-4" id="profilePhone"></p>
                <div class="row g-3 mb-4">
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Address</label>
                    <p class="mb-0" id="profileAddress">-</p>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Member Since</label>
                    <p class="mb-0" id="profileJoined">-</p>
                  </div>
                </div>
                <button class="btn btn-primary px-4" onclick="editProfile()">Edit Profile</button>
              </div>
            </div>
          </div>
        </section>

        <!-- Cart Section -->
        <section id="cartSection" class="section">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0"><i class="fas fa-shopping-cart me-2 text-info"></i>Your Cart</h2>
            <button class="btn btn-outline-primary" onclick="loadSectionData('cart')"><i class="fas fa-refresh me-1"></i>Refresh</button>
          </div>
          <div id="cartContent">
            <div class="loading-spinner mx-auto py-5 d-block"></div>
          </div>
        </section>

        <!-- Payments Section -->
        <section id="paymentsSection" class="section">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0"><i class="fas fa-credit-card me-2 text-success"></i>Payment History</h2>
            <button class="btn btn-outline-primary" onclick="loadSectionData('payments')"><i class="fas fa-refresh me-1"></i>Refresh</button>
          </div>
          <div id="paymentsContent">
            <div class="loading-spinner mx-auto py-5 d-block"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- Load external scripts -->
  <script src="js/shared.js"></script>
  <script src="js/user.js"></script>
