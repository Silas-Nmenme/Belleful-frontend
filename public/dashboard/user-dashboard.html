<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belleful - User Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div class="dashboard-app">
    <!-- Top Navbar -->
    <header class="top-navbar">
      <div class="navbar-container">
        <div class="nav-brand">
          <i class="fas fa-utensils me-2"></i>
          Belleful Dashboard
        </div>
        <div class="nav-actions">
          <button id="notificationBtn" class="notification-btn" aria-label="Notifications" title="Notifications">
            <i class="fas fa-bell" aria-hidden="true"></i>
            <span id="notifBadge" class="badge">3</span>
          </button>
          <div class="user-profile" id="userProfile">
            <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff&size=32" alt="User" class="avatar">
            <span id="userName">Loading...</span>
            <i class="fas fa-chevron-down ms-1"></i>
          </div>
          <button id="logoutBtn" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i>
          </button>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
            <i class="fas fa-moon" aria-hidden="true"></i>
          </button>
          <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Open sidebar menu" title="Open menu">
            <i class="fas fa-bars" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </header>

    <div class="dashboard-content">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <nav class="sidebar-nav">
          <a href="#" data-tab="overview" class="nav-link active">
            <i class="fas fa-chart-line me-2"></i> Overview
          </a>
          <a href="#" data-tab="orders" class="nav-link">
            <i class="fas fa-shopping-bag me-2"></i> Orders
          </a>
          <a href="#" data-tab="profile" class="nav-link">
            <i class="fas fa-user me-2"></i> Profile
          </a>
          <a href="#" data-tab="cart" class="nav-link">
            <i class="fas fa-shopping-cart me-2"></i> Cart
          </a>
          <a href="#" data-tab="payments" class="nav-link">
            <i class="fas fa-credit-card me-2"></i> Payments
          </a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Overview Tab -->
        <section id="overview" class="tab-content active">
          <header class="section-header">
            <h1><i class="fas fa-tachometer-alt me-2"></i>Dashboard Overview</h1>
            <div class="header-actions">
              <button id="refreshBtn" class="btn btn-outline-primary">
                <i class="fas fa-sync-alt me-1"></i>Refresh
              </button>
            </div>
          </header>
          
          <!-- Stats Cards -->
          <div class="stats-grid" id="statsGrid">
            <!-- Dynamic stats cards -->
          </div>

          <!-- Quick Actions -->
          <div class="quick-actions-grid">
            <div class="quick-action-card">
              <i class="fas fa-shopping-bag icon"></i>
              <h3>View Orders</h3>
              <p>Track all your recent orders</p>
              <button class="btn-primary" onclick="switchTab('orders')">View Orders</button>
            </div>
            <div class="quick-action-card">
              <i class="fas fa-shopping-cart icon"></i>
              <h3>Manage Cart</h3>
              <p>Review and checkout</p>
              <button class="btn-primary" onclick="switchTab('cart')">View Cart</button>
            </div>
            <div class="quick-action-card">
              <i class="fas fa-user-edit icon"></i>
              <h3>Update Profile</h3>
              <p>Edit your information</p>
              <button class="btn-primary" onclick="switchTab('profile')">Edit Profile</button>
            </div>
          </div>
        </section>

        <!-- Orders Tab -->
        <section id="orders" class="tab-content">
          <header class="section-header">
            <h1><i class="fas fa-shopping-bag me-2"></i>My Orders</h1>
            <div class="header-actions">
              <label for="ordersStatusFilter" class="visually-hidden">Filter orders by status</label>
              <select id="ordersStatusFilter" class="form-select" aria-label="Filter orders by status">
                <option>All Orders</option>
                <option>Pending</option>
                <option>Delivered</option>
              </select>
              <button id="ordersRefreshBtn" class="btn btn-outline-primary">Refresh</button>
            </div>
          </header>
          <div id="ordersSkeleton" class="skeleton-grid">
            <!-- Skeleton loader -->
          </div>
          <div id="ordersContent" class="orders-table-container">
            <!-- Dynamic orders table -->
          </div>
          <div id="ordersPagination" class="pagination-container">
            <!-- Dynamic pagination -->
          </div>
        </section>

        <!-- Profile Tab -->
        <section id="profile" class="tab-content">
          <header class="section-header">
            <h1><i class="fas fa-user me-2"></i>Profile</h1>
          </header>
          <div class="profile-card" id="profileContent">
            <!-- Dynamic profile -->
          </div>
        </section>

        <!-- Cart Tab -->
        <section id="cart" class="tab-content">
          <header class="section-header">
            <h1><i class="fas fa-shopping-cart me-2"></i>Shopping Cart</h1>
          </header>
          <div id="cartContent" class="cart-section">
            <!-- Dynamic cart summary + checkout link -->
          </div>
        </section>

        <!-- Payments Tab -->
        <section id="payments" class="tab-content">
          <header class="section-header">
            <h1><i class="fas fa-credit-card me-2"></i>Payment History</h1>
          </header>
          <div id="paymentsContent">
            <!-- Dynamic payments list -->
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- Notifications Dropdown -->
  <div id="notificationsDropdown" class="notifications-dropdown">
    <div class="notifications-header">
      <h6>Notifications</h6>
      <button id="clearNotifs">Clear All</button>
    </div>
    <div id="notificationsList" class="notifications-list">
      <!-- Dynamic notifications -->
    </div>
  </div>

  <!-- Order Detail Modal -->
  <div id="orderModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalOrderId"></h3>
        <button class="close-btn">&times;</button>
      </div>
      <div id="modalOrderContent" class="modal-body">
        <!-- Dynamic order details -->
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/user.js"></script>
</body>
</html>
