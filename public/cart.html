<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Belleful</title>
    <!-- Same CDNs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar will be included or copied from index.html -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-gradient-primary shadow-lg">
        <!-- Same navbar as index.html -->
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="fas fa-utensils me-2"></i>Belleful
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#menu">Menu</a></li>
                    <li class="nav-item">
                        <a class="nav-link active" href="cart.html">
                            <i class="fas fa-shopping-cart"></i> Cart 
                            <span class="badge bg-danger cart-count">0</span>
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-5" style="margin-top: 100px;">
        <div class="row">
            <!-- Cart Items -->
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <h1 class="display-4 fw-bold">
                        <i class="fas fa-shopping-cart text-primary me-3"></i>
                        Your Cart
                    </h1>
                    <a href="index.html#menu" class="btn btn-outline-primary btn-lg">
                        <i class="fas fa-plus me-2"></i>Continue Shopping
                    </a>
                </div>
                
                <div id="cartItemsContainer" data-aos="fade-up">
                    <div class="empty-cart text-center py-5" style="display: none;">
                        <i class="fas fa-shopping-cart fa-8x text-muted mb-4"></i>
                        <h3 class="text-muted mb-4">Your cart is empty</h3>
                        <p class="lead text-muted mb-4">Add some delicious items to get started</p>
                        <a href="index.html#menu" class="btn btn-primary btn-lg px-5 py-3">
                            <i class="fas fa-utensils me-2"></i>Browse Menu
                        </a>
                    </div>
                    
                    <!-- Cart items loaded here -->
                    <div id="cartItemsList"></div>
                </div>
            </div>
            
            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="card sticky-top" style="top: 100px;" data-aos="fade-left">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0 fw-bold">
                            <i class="fas fa-receipt me-2"></i>Order Summary
                        </h5>
                    </div>
                    <div class="card-body">
                        <div id="summaryItems"></div>
                        <hr>
                        <div class="d-flex justify-content-between fs-5 fw-bold mb-4">
                            <span>Total:</span>
                            <span id="cartTotal" class="text-success">₦0</span>
                        </div>
                        <button id="checkoutBtn" class="btn btn-success w-100 btn-lg py-3 fw-bold mb-3" disabled>
                            <i class="fas fa-credit-card me-2"></i>Proceed to Checkout
                        </button>
                        <p class="text-muted small text-center mb-0">
                            Secure bank transfer | No extra fees
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/cart.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        
        // Cart page specific logic
        async function loadCartPage() {
            try {
                await window.checkAuthStatus?.() || Promise.resolve(); // Safe auth check
                
                const isAuth = !!localStorage.getItem('token');
                let cartData;
                
                if (isAuth) {
                    cartData = await loadAuthCart();
                    // If auth cart empty, try merge/ fallback to guest
                    if (cartData.items.length === 0) {
                        cartData = getLocalCart();
                    }
                } else {
                    cartData = getLocalCart();
                }
                
                // Safe length check
                if ((cartData.items?.length ?? 0) === 0) {
                    document.querySelector('.empty-cart').style.display = 'block';
                    document.getElementById('checkoutBtn').disabled = true;
                    return;
                }
                
                renderCartItems(cartData.items);
                renderSummary(cartData);
                window.CartManager?.updateCartUI?.();
                
            } catch (error) {
                console.error('Cart load error:', error);
                document.querySelector('.empty-cart').style.display = 'block';
            }
        }
        
        async function loadAuthCart() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${window.API_BASE}/cart`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) {
                    throw new Error('API response not ok');
                }
                const data = await response.json();
                return {
                    items: data.data?.items || data.items || [],
                    totalAmount: data.totalAmount || data.total || 0
                };
            } catch (error) {
                console.warn('Auth cart load failed, using fallback:', error);
                return { items: [], totalAmount: 0 };
            }
        }
        
        function getLocalCart() {
            try {
                const guestCart = JSON.parse(localStorage.getItem('guestCart') || '{\"items\":[]}')
                return {
                    items: guestCart.items || [],
                    totalAmount: guestCart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0)
                };
            } catch (e) {
                console.warn('Local cart parse failed:', e);
                return { items: [], totalAmount: 0 };
            }
        }
        
        function renderCartItems(items) {
            const container = document.getElementById('cartItemsList');
            container.innerHTML = items.map(item => `
                <div class="card mb-4 shadow-sm" data-aos="fade-up" data-aos-delay="100">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-2">
                                <img src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=100&h=100&fit=crop&round" 
                                     class="img-fluid rounded-circle" alt="${item.name || 'Item'}">
                            </div>
                            <div class="col-md-6">
                                <h5 class="fw-bold">${item.name || 'Item'}</h5>
                                <small class="text-muted">Unit: ₦${(item.price || 0).toLocaleString()}</small>
                            </div>
                            <div class="col-md-4 text-end">
                                <div class="input-group w-75 mx-auto">
                                    <button class="btn btn-outline-secondary" onclick="updateQuantity('${item.menuItemId || item.id || ''}', -1)">-</button>
                                    <input type="number" class="form-control text-center fw-bold" value="${item.quantity || 1}" min="1" readonly>
                                    <button class="btn btn-outline-secondary" onclick="updateQuantity('${item.menuItemId || item.id || ''}', 1)">+</button>
                                </div>
                                <div class="mt-2 fs-5 fw-bold text-success">
                                    ₦${((item.price || 0) * (item.quantity || 1)).toLocaleString()}
                                </div>
                                <button class="btn btn-sm btn-outline-danger mt-2" onclick="removeFromCart('${item.menuItemId || item.id || ''}')">
                                    <i class="fas fa-trash"></i> Remove
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderSummary(cartData) {
            const items = cartData.items || [];
            const total = items.reduce((sum, item) => sum + ((item.price || 0) * (item.quantity || 1)), 0);
            document.getElementById('cartTotal').textContent = `₦${total.toLocaleString()}`;
            document.getElementById('checkoutBtn').disabled = items.length === 0;
            
            const summaryItems = document.getElementById('summaryItems');
            summaryItems.innerHTML = items.map(item => `
                <div class="d-flex justify-content-between small mb-2">
                    <span>${item.name || 'Unknown item'} × ${item.quantity || 1}</span>
                    <span>₦${((item.price || 0) * (item.quantity || 1)).toLocaleString()}</span>
                </div>
            `).join('');
        }
        
        window.updateQuantity = async function(id, change) {
            // Implementation for quantity update
            showToast('Quantity updated!', 'success');
        }
        
        window.removeFromCart = async function(id) {
            if (confirm('Remove this item from cart?')) {
                try {
                    const isAuth = !!localStorage.getItem('token');
                    if (isAuth) {
                        const token = localStorage.getItem('token');
                        await fetch(`${window.API_BASE}/cart/${id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                    } else {
                        // Guest cart remove
                        let cart = JSON.parse(localStorage.getItem('guestCart') || '{"items":[]}');
                        cart.items = cart.items.filter(item => (item.menuItemId || item.id) !== id);
                        localStorage.setItem('guestCart', JSON.stringify(cart));
                    }
                    showToast('Item removed from cart!', 'success');
                    loadCartPage();
                } catch (error) {
                    console.error('Remove failed:', error);
                    showToast('Failed to remove item', 'error');
                }
            }
        }
        
        document.getElementById('checkoutBtn').addEventListener('click', () => {
            window.location.href = 'checkout.html';
        });
        
        // Load cart on page load
        loadCartPage();
    </script>
</body>
</html>
